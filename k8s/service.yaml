# ─────────────────────────────────────────────
# T14 AI - Kubernetes Service
# Exposes the FastAPI application via NodePort
# ─────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: t14ai-service
  labels:
    app: t14ai-app
spec:
  type: NodePort
  selector:
    app: t14ai-app
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30080
