# ─────────────────────────────────────────────
# T14 AI - Kubernetes Deployment
# AI-Powered SOC Analyst Assistant
# ─────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: t14ai-app
  labels:
    app: t14ai-app
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: t14ai-app
  template:
    metadata:
      labels:
        app: t14ai-app
        version: v1
    spec:
      containers:
        - name: t14ai-app
          image: t14ai-security-assistant:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama-service:11434"
            - name: OLLAMA_MODEL
              value: "qwen3:8b"
            - name: CHROMA_HOST
              value: "chromadb-service"
            - name: CHROMA_PORT
              value: "8000"
            - name: EMBEDDING_MODEL
              value: "all-MiniLM-L6-v2"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
